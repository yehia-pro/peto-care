    <!-- Critical CSS: Clean Minimal Splash Screen -->
    <style>
      html, body {
        margin: 0; padding: 0;
        font-family: 'Tajawal', 'Inter', -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        background-color: #ffffff;
        overflow-x: hidden;
      }
      #root { min-height: 100vh; }

      /* ─── Splash Screen ─────────────────────────── */
      .peto-splash {
        position: fixed;
        inset: 0;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        overflow: hidden;
      }

      /* Corner leaf decorations */
      .peto-corner {
        position: absolute;
        pointer-events: none;
        opacity: 0.75;
      }
      .peto-corner.tl { top: 0;    left: 0; }
      .peto-corner.tr { top: 0;    right: 0;  transform: scaleX(-1); }
      .peto-corner.bl { bottom: 0; left: 0;   transform: scaleY(-1); }
      .peto-corner.br { bottom: 0; right: 0;  transform: scale(-1); }

      /* Logo circle badge */
      .peto-badge {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background: linear-gradient(135deg, #38bdf8 0%, #2dd4bf 55%, #34d399 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow:
          0 24px 64px rgba(45,212,191,0.30),
          0  8px 24px rgba(56,189,248,0.20);
        animation: petoFloat 3s ease-in-out infinite;
        margin-bottom: 2rem;
      }

      @keyframes petoFloat {
        0%,100% { transform: translateY(0); }
        50%      { transform: translateY(-10px); }
      }

      /* Text */
      .peto-title {
        font-size: 3rem;
        font-weight: 900;
        color: #1e293b;
        letter-spacing: -1px;
        font-family: 'Inter', -apple-system, sans-serif;
        direction: ltr;
        margin: 0;
      }
      .peto-line {
        width: 52px;
        height: 3px;
        border-radius: 2px;
        background: linear-gradient(to right, #38bdf8, #34d399);
        margin: 10px auto;
      }
      .peto-subtitle {
        font-size: 1.25rem;
        color: #94a3b8;
        font-weight: 500;
        font-family: 'Tajawal', sans-serif;
        direction: rtl;
        margin: 0;
      }

      /* Bottom progress bar */
      .peto-track {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 4px;
        background: #f1f5f9;
      }
      .peto-fill {
        height: 100%;
        background: linear-gradient(to right, #38bdf8, #2dd4bf, #34d399);
        border-radius: 0 2px 2px 0;
        animation: petoProgress 2.8s cubic-bezier(.4,0,.2,1) forwards;
      }
      @keyframes petoProgress {
        0%   { width: 0%; }
        100% { width: 100%; }
      }
    </style>
