        font-size: 1.2rem;
        font-weight: 500;
        display: flex;
        align-items: center;

      .loader-dots::after {
        content: '...';
        animation: ellipsis 1.5s infinite;
        width: 1.5em;
        text-align: left;
        display: inline-block;
      }

      @keyframes pulseLogo {
        0%, 100% {
          transform: scale(1);
          box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.15), 0 10px 10px -5px rgba(37, 99, 235, 0.05);
        }
        50% {

          box-shadow: 0 25px 30px -5px rgba(124, 58, 237, 0.2), 0 15px 15px -5px rgba(124, 58, 237, 0.1);
        }
      }

      @keyframes ellipsis {
        0% { content: ''; }
        25% { content: '.'; }
        50% { content: '..'; }
        75% { content: '...'; }
      }
